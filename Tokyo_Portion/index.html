<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tokyo Trip">
<meta name="theme-color" content="#1a1a1a">
<title>Tokyo Trip · Days 0–5</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: #888;
    --subtle: #555;
    --food: #e8856a;
    --shop: #6abf8e;
    --sight: #6aaee8;
    --book: #e86a6a;
    --accent: #e8c96a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: var(--bg); }
  body {
    font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .topbar-inner { display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .filter-row {
    display: flex;
    gap: 6px;
    padding: 10px 18px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .content { padding: 12px 14px calc(var(--safe-bottom) + 80px); }
  .day-card {
    background: var(--surface);
    border-radius: 16px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 0.5px solid var(--border);
  }
  .day-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .day-num {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .d0 { background: #2a2040; color: #c4b8f0; }
  .d1 { background: #1a3028; color: #6abf8e; }
  .d2 { background: #3a2018; color: #e8856a; }
  .d3 { background: #18263a; color: #6aaee8; }
  .d4 { background: #2e1a2e; color: #d06ad0; }
  .d5 { background: #2e2610; color: #e8c96a; }
  .day-header-text { flex: 1; min-width: 0; }
  .day-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .day-sub { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chevron { color: var(--subtle); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }
  .day-body { border-top: 0.5px solid var(--border); }
  .section { padding: 0 16px; }
  .section-head {
    display: flex; align-items: center; gap: 6px;
    padding: 11px 0 8px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted);
    border-bottom: 0.5px solid var(--border);
  }
  .sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .item:last-child { border-bottom: none; }
  .item.done { opacity: 0.38; }
  .item.done .item-name { text-decoration: line-through; }
  .check-wrap { padding-top: 2px; flex-shrink: 0; }
  .checkbox {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--subtle);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: transparent;
  }
  .item.done .checkbox {
    background: var(--subtle);
    border-color: var(--subtle);
  }
  .checkmark { display: none; color: var(--bg); font-size: 12px; font-weight: 700; }
  .item.done .checkmark { display: block; }
  .item-text { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px; font-weight: 500;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    line-height: 1.3;
  }
  .book-tag {
    font-size: 10px; padding: 2px 7px;
    border-radius: 8px;
    background: rgba(232,106,106,0.15);
    color: var(--book);
    font-weight: 600; white-space: nowrap;
  }
  .item-tip { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .day-tip {
    margin: 0 16px 14px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    border-left: 2px solid var(--accent);
  }
  .day-tip strong { color: var(--accent); font-weight: 600; }
  .legend {
    padding: 14px 18px;
    display: flex; gap: 14px; flex-wrap: wrap;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .ldot { width: 7px; height: 7px; border-radius: 50%; }
  .progress-bar { height: 2px; background: var(--surface2); margin: 0 18px 14px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--food)); border-radius: 2px; transition: width 0.3s; }
  .progress-label { font-size: 11px; color: var(--muted); padding: 0 18px; margin-bottom: 12px; }
  .clear-btn {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 20px);
    right: 18px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    z-index: 50;
  }
  .add-btn {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 20px);
    left: 18px;
    background: var(--accent);
    border: none;
    color: #1a1600;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 50;
    display: flex; align-items: center; gap: 6px;
  }
  .sheet-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .sheet-overlay.open { display: flex; align-items: flex-end; }
  .sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 0.5px solid var(--border);
    padding: 0 0 calc(var(--safe-bottom) + 20px);
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  }
  .sheet-overlay.open .sheet { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--subtle); border-radius: 2px; margin: 12px auto 4px; }
  .sheet-title { font-size: 16px; font-weight: 600; padding: 10px 18px 16px; border-bottom: 0.5px solid var(--border); }
  .sheet-body { padding: 16px 18px; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .field-input {
    width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 15px;
    padding: 10px 12px; margin-bottom: 14px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    outline: none;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--subtle); }
  .seg-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .seg-btn {
    flex: 1; min-width: 70px; padding: 8px 6px; border-radius: 10px;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .seg-btn.sel-food { background: rgba(232,133,106,0.18); color: var(--food); border-color: var(--food); }
  .seg-btn.sel-shopping { background: rgba(106,191,142,0.18); color: var(--shop); border-color: var(--shop); }
  .seg-btn.sel-sights { background: rgba(106,174,232,0.18); color: var(--sight); border-color: var(--sight); }
  .day-seg-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .day-seg-btn {
    padding: 7px 12px; border-radius: 10px;
    border: 0.5px solid var(--border); background: transparent;
    color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .day-seg-btn.sel { background: var(--surface2); color: var(--text); border-color: var(--subtle); }
  .sheet-save {
    width: 100%; padding: 13px; border-radius: 12px;
    background: var(--accent); border: none; color: #1a1600;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .sheet-save:disabled { opacity: 0.35; }
  .custom-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 8px;
    background: rgba(232,201,106,0.15); color: var(--accent);
    font-weight: 600; white-space: nowrap;
  }
  .del-btn {
    flex-shrink: 0; padding: 4px 6px; background: transparent;
    border: none; color: var(--subtle); font-size: 16px; cursor: pointer;
    line-height: 1; border-radius: 6px; margin-left: 2px;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--book); }
  .map-btn {
    display: inline-flex; align-items: center; gap: 3px;
    margin-top: 5px;
    font-size: 11px; font-weight: 500;
    color: var(--sight);
    background: rgba(106,174,232,0.1);
    border: 0.5px solid rgba(106,174,232,0.25);
    border-radius: 6px; padding: 3px 8px;
    text-decoration: none; cursor: pointer;
    white-space: nowrap;
  }
  .map-btn:active { opacity: 0.7; }

  /* PWA home screen mode - add extra top padding for Dynamic Island */
  @media all and (display-mode: standalone) {
    .topbar {
      padding-top: calc(env(safe-area-inset-top, 59px) + 14px);
    }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="topbar h1">🇯🇵 Tokyo Trip</div>
      <div class="sub">Days 0–5 · Tap items to check off</div>
    </div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="ldot" style="background:var(--food)"></div>Food</div>
  <div class="legend-item"><div class="ldot" style="background:var(--shop)"></div>Shopping</div>
  <div class="legend-item"><div class="ldot" style="background:var(--sight)"></div>Sights</div>
  <div class="legend-item"><div class="ldot" style="background:var(--book)"></div>Book ahead</div>
</div>

<div class="filter-row" id="filters">
  <button class="filter-btn active" data-filter="all">All days</button>
  <button class="filter-btn" data-filter="0">Day 0</button>
  <button class="filter-btn" data-filter="1">Day 1</button>
  <button class="filter-btn" data-filter="2">Day 2</button>
  <button class="filter-btn" data-filter="3">Day 3</button>
  <button class="filter-btn" data-filter="4">Day 4</button>
  <button class="filter-btn" data-filter="5">Day 5</button>
  <button class="filter-btn" data-filter="book">📌 Must book</button>
  <button class="filter-btn" data-filter="mine">⭐ My items</button>
</div>

<div style="padding: 12px 18px 4px;">
  <div class="progress-label" id="prog-label">0 of 0 checked off</div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="content" id="content"></div>
<button class="clear-btn" id="clear-btn">Reset all</button>
<button class="add-btn" id="add-btn">＋ Add item</button>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add your own item</div>
    <div class="sheet-body">
      <div class="field-label">Name</div>
      <input class="field-input" id="custom-name" placeholder="e.g. Ramen spot from TikTok" maxlength="80">
      <div class="field-label">Note (optional)</div>
      <input class="field-input" id="custom-tip" placeholder="e.g. Near Shinjuku, opens 6pm" maxlength="160">
      <div class="field-label">Category</div>
      <div class="seg-row" id="cat-row">
        <button class="seg-btn" data-cat="food">Food</button>
        <button class="seg-btn" data-cat="shopping">Shopping</button>
        <button class="seg-btn" data-cat="sights">Sightseeing</button>
      </div>
      <div class="field-label">Day</div>
      <div class="day-seg-row" id="day-row">
        <button class="day-seg-btn" data-day="0">Day 0</button>
        <button class="day-seg-btn" data-day="1">Day 1</button>
        <button class="day-seg-btn" data-day="2">Day 2</button>
        <button class="day-seg-btn" data-day="3">Day 3</button>
        <button class="day-seg-btn" data-day="4">Day 4</button>
        <button class="day-seg-btn" data-day="5">Day 5</button>
      </div>
      <button class="sheet-save" id="sheet-save" disabled>Add to itinerary</button>
    </div>
  </div>
</div>

<script>
const DAYS = [
  {
    index: 0, label: "Day 0", cls: "d0",
    title: "Arrival · Ginza wander",
    sub: "Land ~2pm · Check-in · Light Ginza explore",
    tip: "<strong>Day tip:</strong> Keep it easy. You just landed. Save your appetite for the days ahead.",
    food: [
      { name: "Tonkatsu Marushichi Ginza", tip: "Excellent late-afternoon set lunch. Order the hire-katsu (tenderloin). No res needed for solo/pair.", book: false },
      { name: "Cloud Club Matcha (Ginza)", tip: "Perfect first Japanese matcha moment. Opens until ~8pm. Quick stop, no queue usually.", book: false },
      { name: "Kaiten Sushi Ginza", tip: "Conveyor belt sushi — low commitment, fun intro. Order seasonal specials off the touch screen.", book: false },
      { name: "Azabu Yokota Ginza Bettei", tip: "Upscale izakaya vibes. Book ahead if going for dinner on arrival night — fills fast.", book: true },
    ],
    shopping: [
      { name: "Ginza Six", tip: "Iconic mall — browse floors 1–3 for Japanese brands. Closes 8pm weekdays.", book: false },
      { name: "Itoya", tip: "12-floor stationery paradise. A must. Go to B1 for custom rubber stamps.", book: false },
      { name: "OK Ginza", tip: "Discount supermarket in Ginza. Stock up on snacks and drinks for the room.", book: false },
      { name: "Muji (Ginza flagship)", tip: "The largest Muji on earth. Worth seeing even if you don't buy.", book: false },
    ],
    sights: [
      { name: "Ginza stroll + photo booth", tip: "Walk the Chuo-dori. Purikura photo booths near Ginza station.", book: false },
    ]
  },
  {
    index: 1, label: "Day 1", cls: "d1",
    title: "Shibuya · Harajuku · Shinjuku",
    sub: "Street fashion · Golden Gai night",
    tip: "<strong>Day tip:</strong> Hit Takeshita Street before 11am to beat crowds. Wear comfortable shoes — lots of walking.",
    food: [
      { name: "Ichiran (Shibuya)", tip: "Solo ramen in private booths. Open 24hrs. Go before noon to avoid lines.", book: false },
      { name: "Machidashoten Shibuyaten", tip: "Moody café in Scramble Square. Good matcha lattes and toast.", book: false },
      { name: "Moheji Shibuya Scramble Square", tip: "Local izakaya-style on upper floors of Scramble Square. Lively lunch.", book: false },
      { name: "Omurice Ikura Shibuya", tip: "Fluffy omurice is iconic. Tiny spot — queue by 11:30am. Get there early.", book: false },
      { name: "Gyukatsu Kyoto Katsugyu", tip: "Rare wagyu beef cutlet on tabletop grill. Worth the queue (20–40 min).", book: false },
      { name: "Izakaya / Golden Gai (night)", tip: "No reservations needed. Bring cash only. Pick a bar that's half-full and say 'sumimasen'.", book: false },
      { name: "McDonald's Japan", tip: "Yes, seriously. Teriyaki Burger and Shaka Shaka Chicken are legitimately good late-night stops.", book: false },

    ],
    sights: [
      { name: "Meiji Jingu", tip: "Arrive by 9am. The forested walk to the shrine takes ~20 min. Free entry.", book: false },

  {
    index: 2, label: "Day 2", cls: "d2",
    title: "DisneySea (all day) · Ginza evening",

    tip: "<strong>Day tip:</strong> Book tickets months in advance online. Ride Journey to the Center of the Earth and Soaring first at rope drop.",
    food: [
      { name: "Wagyu Sando at DisneySea", tip: "The park food is surprisingly great. Book the Magellan restaurant inside the park for lunch.", book: true },
      { name: "Ginza Sushi Ichidai Yugo", tip: "High-quality kaiten sushi with premium nigiri. Opens 5pm for dinner. Book ahead.", book: true },
      { name: "Royce Chocolate (Ginza)", tip: "Stop for their fresh nama chocolate after dinner. Bring a cooler bag — they're delicate.", book: false },

      { name: "Tsukiji Fish Market (8am)", tip: "Arrive at 8am. Tamagoyaki, fresh tuna on rice, grilled scallops from outdoor stalls. Gets crowded by 9:30am.", book: false },

    shopping: [

      { name: "Second Street (Ueno area)", tip: "Japan's largest secondhand chain. Great vintage finds at low prices.", book: false },
      { name: "Akihabara electronics", tip: "Yodobashi Camera and Bic Camera. Check tax-free rules — bring your passport.", book: false },
    ],
    sights: [
      { name: "Senso-ji Temple (Asakusa)", tip: "Tokyo's oldest temple. Arrive before 9am to beat tour groups. Free entry.", book: false },
      { name: "Hourin-ji (Akihabara area)", tip: "Small atmospheric temple — often called the 'needle memorial'. Quiet and photogenic.", book: false },
      { name: "Yamamoto-Tei (Ueno)", tip: "Beautiful Meiji-era villa with a Japanese garden. ¥400 entry. Great mid-afternoon break.", book: false },
      { name: "Akihabara district", tip: "Walk the main strip for electronics, anime, retro game shops, and maid cafes. Open 11am–8pm.", book: false },
    ]
  },

const STORAGE_KEY = 'tokyo-trip-checked-v1';
const CUSTOM_KEY = 'tokyo-trip-custom-v1';
let checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let customItems = JSON.parse(localStorage.getItem(CUSTOM_KEY) || '[]');
let currentFilter = 'all';

function saveChecked() { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); }
function saveCustom() { localStorage.setItem(CUSTOM_KEY, JSON.stringify(customItems)); }
function getItemId(dayIdx, type, itemIdx) { return `d${dayIdx}-${type}-${itemIdx}`; }
function getCustomId(uid) { return 'custom-' + uid; }

function updateProgress() {
  let total = 0, done = 0;
  DAYS.forEach(day => {
    ['food','shopping','sights'].forEach(type => {
      const arr = type === 'shopping' ? day.shopping : type === 'sights' ? day.sights : day.food;
      if (!arr) return;
      arr.forEach((item, i) => { total++; if (checked[getItemId(day.index, type, i)]) done++; });
    });
  });
  customItems.forEach(ci => { total++; if (checked[getCustomId(ci.uid)]) done++; });
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${done} of ${total} items checked off`;
}

function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  DAYS.forEach(day => {
    if (currentFilter !== 'all' && currentFilter !== 'book' && currentFilter !== 'mine' && parseInt(currentFilter) !== day.index) return;
    if (currentFilter === 'mine') return;
    if (currentFilter === 'book') {
      const hasBook = [...(day.food||[]),...(day.shopping||[]),...(day.sights||[])].some(i => i.book);
      if (!hasBook) return;
    }
    const card = document.createElement('div');
    card.className = 'day-card';
    const customForDay = customItems.filter(ci => ci.day === day.index);
    const hasCustom = customForDay.length > 0;
    card.innerHTML = `
      <div class="day-header" onclick="toggleDay(this)">
        <div class="day-num ${day.cls}">${day.label.replace('Day ','')}</div>
        <div class="day-header-text">
          <div class="day-title">${day.title}</div>
          <div class="day-sub">${day.sub}</div>
        </div>
        <div class="chevron">▾</div>
      </div>
      <div class="day-body" style="display:none;">
        ${renderSection(day, 'food', 'Food & drinks', 'var(--food)')}
        ${renderSection(day, 'shopping', 'Shopping', 'var(--shop)')}
        ${renderSection(day, 'sights', 'Sightseeing', 'var(--sight)')}
        ${hasCustom ? renderCustomSection(customForDay) : ''}
        <div class="section"><div class="day-tip" style="margin: 12px 0;">${day.tip}</div></div>
      </div>
    `;
    content.appendChild(card);
  });

  if (currentFilter === 'mine' || currentFilter === 'all') {
    if (customItems.length > 0) {
      if (currentFilter === 'mine') {
        const card = document.createElement('div');
        card.className = 'day-card';
        card.innerHTML = `
          <div class="day-header" onclick="toggleDay(this)">
            <div class="day-num" style="background:#1e2a1e;color:var(--accent);font-size:16px;">★</div>
            <div class="day-header-text">
              <div class="day-title">My added items</div>
              <div class="day-sub">All custom items across all days</div>
            </div>
            <div class="chevron">▾</div>
          </div>
          <div class="day-body" style="display:none;">
            ${renderCustomSection(customItems, true)}
          </div>
        `;
        content.appendChild(card);
        content.querySelector('.day-header').click();
      }
    } else if (currentFilter === 'mine') {
      content.innerHTML = '<div style="text-align:center;padding:40px 18px;color:var(--muted);font-size:14px;">No custom items yet.<br>Tap <strong style="color:var(--accent)">＋ Add item</strong> to get started.</div>';
    }
  }
  updateProgress();
}

function mapsUrl(name) {
  return 'https://maps.apple.com/?q=' + encodeURIComponent(name + ' Tokyo Japan');
}

function mapBtn(name) {
  return `<a class="map-btn" href="${mapsUrl(name)}" onclick="event.stopPropagation()">&#9906; Maps</a>`;
}

function renderSection(day, type, label, color) {
  const arr = type === 'shopping' ? day.shopping : type === 'sights' ? day.sights : day.food;
  if (!arr || arr.length === 0) return '';
  if (currentFilter === 'book') {
    const filtered = arr.filter(i => i.book);
    if (filtered.length === 0) return '';
    let html = `<div class="section"><div class="section-head"><div class="sdot" style="background:${color}"></div>${label}</div>`;
    filtered.forEach((item) => {
      const origIdx = arr.indexOf(item);
      const id = getItemId(day.index, type, origIdx);
      const done = checked[id] ? 'done' : '';
      html += `<div class="item ${done}" onclick="toggleItem('${id}', this)">
        <div class="check-wrap"><div class="checkbox"><span class="checkmark">&#10003;</span></div></div>
        <div class="item-text">
          <div class="item-name">${item.name}<span class="book-tag">book ahead</span></div>
          <div class="item-tip">${item.tip}</div>
          ${mapBtn(item.name)}
        </div>
      </div>`;
    });
    html += '</div>';
    return html;
  }
  let html = `<div class="section"><div class="section-head"><div class="sdot" style="background:${color}"></div>${label}</div>`;
  arr.forEach((item, i) => {
    const id = getItemId(day.index, type, i);
    const done = checked[id] ? 'done' : '';
    html += `<div class="item ${done}" onclick="toggleItem('${id}', this)">
      <div class="check-wrap"><div class="checkbox"><span class="checkmark">&#10003;</span></div></div>
      <div class="item-text">
        <div class="item-name">${item.name}${item.book ? '<span class="book-tag">book ahead</span>' : ''}</div>
        <div class="item-tip">${item.tip}</div>
        ${mapBtn(item.name)}
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderCustomSection(items, showDay) {
  if (!items.length) return '';
  const catColors = { food: 'var(--food)', shopping: 'var(--shop)', sights: 'var(--sight)' };
  let html = `<div class="section"><div class="section-head"><div class="sdot" style="background:var(--accent)"></div>My additions</div>`;
  items.forEach(ci => {
    const id = getCustomId(ci.uid);
    const done = checked[id] ? 'done' : '';
    const dayLabels = ['D0','D1','D2','D3','D4','D5'];
    const catDot = catColors[ci.cat] || 'var(--muted)';
    html += `<div class="item ${done}" id="ci-${ci.uid}">
      <div class="check-wrap" onclick="toggleCustom('${ci.uid}')"><div class="checkbox"><span class="checkmark">&#10003;</span></div></div>
      <div class="item-text" onclick="toggleCustom('${ci.uid}')">
        <div class="item-name">
          <span class="sdot" style="background:${catDot};width:7px;height:7px;display:inline-block;border-radius:50%;"></span>
          ${ci.name}
          <span class="custom-tag">mine</span>
          ${showDay ? `<span style="font-size:10px;color:var(--muted);font-weight:400">${dayLabels[ci.day]}</span>` : ''}
        </div>
        ${ci.tip ? `<div class="item-tip">${ci.tip}</div>` : ''}
        <a class="map-btn" href="https://maps.apple.com/?q=${encodeURIComponent(ci.name + ' Tokyo Japan')}" onclick="event.stopPropagation()">&#9906; Maps</a>
      </div>
      <button class="del-btn" onclick="deleteCustom('${ci.uid}')">&#215;</button>
    </div>`;
  });
  html += '</div>';
  return html;
}

function toggleDay(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  chevron.classList.toggle('open', !isOpen);
}

function toggleItem(id, el) {
  checked[id] = !checked[id];
  saveChecked();
  el.classList.toggle('done', checked[id]);
  updateProgress();
}

function toggleCustom(uid) {
  const id = getCustomId(uid);
  checked[id] = !checked[id];
  saveChecked();
  const el = document.getElementById('ci-' + uid);
  if (el) el.classList.toggle('done', checked[id]);
  updateProgress();
}

function deleteCustom(uid) {
  customItems = customItems.filter(ci => ci.uid !== uid);
  saveCustom();
  delete checked[getCustomId(uid)];
  saveChecked();
  renderAll();
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  renderAll();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (confirm('Reset all checkmarks?')) { checked = {}; saveChecked(); renderAll(); }
});

const overlay = document.getElementById('sheet-overlay');
const sheet = document.getElementById('sheet');
let selCat = null, selDay = null;

document.getElementById('add-btn').addEventListener('click', () => {
  document.getElementById('custom-name').value = '';
  document.getElementById('custom-tip').value = '';
  selCat = null; selDay = null;
  document.querySelectorAll('.seg-btn').forEach(b => b.className = 'seg-btn');
  document.querySelectorAll('.day-seg-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('sheet-save').disabled = true;
  overlay.classList.add('open');
  setTimeout(() => document.getElementById('custom-name').focus(), 350);
});

overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

document.getElementById('cat-row').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  selCat = btn.dataset.cat;
  document.querySelectorAll('.seg-btn').forEach(b => { b.className = 'seg-btn'; });
  btn.classList.add('sel-' + selCat);
  checkSave();
});

document.getElementById('day-row').addEventListener('click', e => {
  const btn = e.target.closest('.day-seg-btn');
  if (!btn) return;
  selDay = parseInt(btn.dataset.day);
  document.querySelectorAll('.day-seg-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  checkSave();
});

document.getElementById('custom-name').addEventListener('input', checkSave);

function checkSave() {
  const name = document.getElementById('custom-name').value.trim();
  document.getElementById('sheet-save').disabled = !(name && selCat !== null && selDay !== null);
}

document.getElementById('sheet-save').addEventListener('click', () => {
  const name = document.getElementById('custom-name').value.trim();
  const tip = document.getElementById('custom-tip').value.trim();
  if (!name || selCat === null || selDay === null) return;
  const uid = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  customItems.push({ uid, name, tip, cat: selCat, day: selDay });
  saveCustom();
  overlay.classList.remove('open');
  renderAll();
  const allDayCards = document.querySelectorAll('.day-card');
  const dayCard = [...allDayCards].find(c => {
    const badge = c.querySelector('.day-num');
    return badge && badge.textContent.trim() === String(selDay);
  });
  if (dayCard) {
    const body = dayCard.querySelector('.day-body');
    if (body && body.style.display === 'none') dayCard.querySelector('.day-header').click();
    setTimeout(() => dayCard.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
  }
});

renderAll();
document.querySelector('.day-header').click();
</script>
